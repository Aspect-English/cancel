<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aspect K書會館｜取消預約</title>

  <style>
    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f5f1e8;
      padding: 20px;
      margin: 0;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #8b3a0e;
      font-size: 36px;
      margin-bottom: 20px;
    }

    .box {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h2 {
      color: #333;
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 12px;
      border-left: 4px solid #8b3a0e;
      padding-left: 10px;
    }

    p {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-weight: bold;
      color: #555;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      background-color: #fafafa;
    }

    input:read-only {
      background-color: #eee;
      color: #666;
      cursor: not-allowed;
    }

    button {
      width: 100%;
      border: none;
      background: #8b3a0e;
      color: white;
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      font-size: 17px;
      margin-top: 20px;
      font-weight: bold;
    }

    button:hover {
      background: #722f0b;
    }

    button:disabled {
      background: #bbb;
      cursor: not-allowed;
    }

    .notice {
      background: #fff7ed;
      border-left: 4px solid #d97706;
      padding: 12px;
      border-radius: 8px;
      color: #7c2d12;
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <div class="container">
    <h1>Aspect K書會館｜取消預約</h1>

    <div class="box">
      <h2>取消預約確認</h2>
      <p>
        系統會依照信件連結自動驗證預約資料。<br>
        ※ 僅可於「預約日前」自行取消。<br>
        ※ 預約當天請私訊官方 LINE，由櫃台協助取消。
      </p>

      <label>預約日期</label>
      <input type="date" id="cancelDate" readonly />

      <label>預約電話</label>
      <input id="cancelPhone" readonly />

      <label>預約 Email</label>
      <input id="cancelEmail" readonly />

      <!-- 取消驗證碼仍然存在，但不顯示給學生看 -->
      <input type="hidden" id="cancelToken" />

      <div class="notice" id="noticeText">
        正在驗證您的預約資料，請稍候...
      </div>

      <button type="button" id="cancelBtn" onclick="cancelBooking()" disabled>
        資料確認中...
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://uebzafxelfpfmpqbcgwd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_JTcWsklR-rYX5AqKYxdymQ_b746IsEe";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzI_ReRWMB4sEtKLYbZ_rzm5O_f8iyz4F_l_IORoVg6R1bSlXaQROgQf1WOFwSHy9RWAA/exec";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let matchedReservations = [];

    function getTodayString() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function getUrlParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        date: params.get("date") || "",
        phone: params.get("phone") || "",
        email: params.get("email") || "",
        token: params.get("token") || ""
      };
    }

    function fillFormFromUrl() {
      const params = getUrlParams();
      document.getElementById("cancelDate").value = params.date;
      document.getElementById("cancelPhone").value = params.phone;
      document.getElementById("cancelEmail").value = params.email;
      document.getElementById("cancelToken").value = params.token;
      return params;
    }

    function checkRequiredParams(params) {
      const missing = [];
      if (!params.date) missing.push("預約日期");
      if (!params.phone) missing.push("電話");
      if (!params.email) missing.push("Email");
      if (!params.token) missing.push("取消驗證碼");
      return missing;
    }

    async function loadBookingInfo() {
      const cancelBtn = document.getElementById("cancelBtn");
      const noticeText = document.getElementById("noticeText");

      const params = fillFormFromUrl();
      const missing = checkRequiredParams(params);

      if (missing.length > 0) {
        noticeText.innerText = "取消連結資料不完整，請回到預約成功通知信重新點選取消連結。";
        cancelBtn.disabled = true;
        cancelBtn.innerText = "連結資料不完整";
        alert("取消連結資料不完整，缺少：" + missing.join("、"));
        return;
      }

      const todayString = getTodayString();
      if (params.date <= todayString) {
        noticeText.innerText = "此預約日期為今天或已過期，無法透過網頁自行取消，請私訊官方 LINE。";
        cancelBtn.disabled = true;
        cancelBtn.innerText = "無法線上取消";
        return;
      }

      const { data, error } = await supabaseClient
        .from("reservations")
        .select("id, user_name, booking_date, time_slot, row_group, phone, email, status, cancel_token")
        .eq("booking_date", params.date)
        .eq("phone", params.phone)
        .eq("email", params.email)
        .eq("cancel_token", params.token)
        .eq("status", "booked")
        .order("time_slot", { ascending: true });

      if (error) {
        noticeText.innerText = "查詢資料庫失敗，請稍後再試或聯繫櫃台。";
        cancelBtn.disabled = true;
        cancelBtn.innerText = "查詢失敗";
        alert("查詢資料庫失敗：" + error.message);
        return;
      }

      if (!data || data.length === 0) {
        noticeText.innerText = "查無可取消的有效預約。可能已取消，或信件連結資料不完整。";
        cancelBtn.disabled = true;
        cancelBtn.innerText = "查無可取消預約";
        alert("查無可取消的有效預約。可能此預約已取消，或取消連結資料不正確。");
        return;
      }

      matchedReservations = data;
      noticeText.innerText = "已完成驗證。按下取消後，系統會跳出視窗讓您再次確認預約內容。";
      cancelBtn.disabled = false;
      cancelBtn.innerText = "確認取消預約";
    }

    async function cancelBooking() {
      const params = getUrlParams();
      const missing = checkRequiredParams(params);
      const cancelBtn = document.getElementById("cancelBtn");
      const noticeText = document.getElementById("noticeText");

      if (missing.length > 0) {
        alert("取消連結資料不完整，缺少：" + missing.join("、"));
        return;
      }

      if (!matchedReservations || matchedReservations.length === 0) {
        alert("尚未讀取到可取消的預約資料，請重新整理頁面後再試。");
        return;
      }

      const todayString = getTodayString();
      if (params.date <= todayString) {
        alert("預約當天或已過期的預約無法透過網頁自行取消，請私訊官方 LINE。");
        return;
      }

      const first = matchedReservations[0];
      const times = matchedReservations.map(item => item.time_slot).join("、");
      const rows = matchedReservations.map(item => item.row_group).join("、");

      const confirmCancel = confirm(
        "請確認是否取消以下預約？\n\n" +
        "姓名：" + (first.user_name || "未填寫") + "\n" +
        "預約日期：" + params.date + "\n" +
        "預約時段：" + times + "\n" +
        "預約座位：" + rows + "\n\n" +
        "按下「確定」後將取消此筆預約。"
      );

      if (!confirmCancel) return;

      cancelBtn.disabled = true;
      cancelBtn.innerText = "取消處理中...";
      noticeText.innerText = "正在取消預約，請稍候...";

      const ids = matchedReservations.map(item => item.id);

      const { error: updateError } = await supabaseClient
        .from("reservations")
        .update({
          status: "cancelled",
          note: "使用者由取消頁面自行取消"
        })
        .in("id", ids)
        .eq("status", "booked");

      if (updateError) {
        noticeText.innerText = "取消失敗，請稍後再試或聯繫櫃台。";
        cancelBtn.disabled = false;
        cancelBtn.innerText = "確認取消預約";
        alert("取消失敗：" + updateError.message);
        return;
      }

      sendCancelEmailToGoogleScript({
        action: "cancel",
        token: params.token,
        email: params.email,
        userName: first.user_name || "",
        date: params.date,
        times: times,
        rows: rows,
        phone: params.phone,
        cancelSource: "學生自行取消"  
      });

      noticeText.innerText = "預約已取消成功，系統將寄送通知信給學生與補習班。";
      cancelBtn.innerText = "預約已成功取消";
      alert("預約取消成功！取消成功通知信將寄送至學生與補習班信箱。");
    }

    function sendCancelEmailToGoogleScript(payload) {
      const form = document.createElement("form");
      form.method = "POST";
      form.action = SCRIPT_URL;
      form.target = "hidden_iframe";

      const input = document.createElement("input");
      input.type = "hidden";
      input.name = "payload";
      input.value = JSON.stringify(payload);

      form.appendChild(input);
      document.body.appendChild(form);
      form.submit();

      setTimeout(() => {
        document.body.removeChild(form);
      }, 1000);
    }

    window.addEventListener("DOMContentLoaded", loadBookingInfo);
  </script>
</body>
</html>
